name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Explicitly point npm at the public registry — avoids any inherited
          # enterprise registry config that may exist in the runner environment.
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci
        env:
          # Clear any inherited NPM_TOKEN / NODE_AUTH_TOKEN that could
          # cause an accidental auth header to be sent to the public registry.
          NODE_AUTH_TOKEN: ''

      - name: Build
        run: npm run build
        env:
          # Provide required runtime env vars for the build
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}


      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          output_location: ".next"
          skip_app_build: true

